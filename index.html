<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 对比问答</title>
  <style>
    :root {
      --bg: #f3f6fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #1368ce;
      --accent-hover: #0f57ac;
      --border: #dbe3ee;
      --error: #b42318;
      --ok: #027a48;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: start center;
      background: radial-gradient(circle at top, #e8f1ff 0%, var(--bg) 55%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      padding: 24px;
    }

    .card {
      width: min(1280px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 10px 25px rgba(17, 24, 39, 0.08);
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.5rem, 2.6vw, 2rem);
    }

    p {
      margin: 0;
      color: var(--muted);
    }

    .field {
      margin-top: 16px;
      display: grid;
      gap: 6px;
    }

    label {
      font-size: 0.9rem;
      color: var(--muted);
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 11px 12px;
      font-size: 0.95rem;
      outline: none;
      background: #fff;
    }

    input:focus,
    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(19, 104, 206, 0.14);
    }

    textarea {
      margin-top: 12px;
      min-height: 96px;
      resize: vertical;
    }

    .actions {
      margin-top: 10px;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 11px 16px;
      background: var(--accent);
      color: #fff;
      font-weight: 600;
      cursor: pointer;
    }

    button:hover { background: var(--accent-hover); }
    button:disabled { opacity: 0.6; cursor: not-allowed; }

    .note {
      color: var(--muted);
      font-size: 0.9rem;
    }

    .warning {
      margin-top: 10px;
      color: #9a3412;
      font-size: 0.92rem;
    }

    .results {
      margin-top: 18px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .column {
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      background: #fff;
      min-height: 420px;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .head {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #f8fbff;
      gap: 8px;
    }

    .title {
      font-weight: 600;
      font-size: 0.95rem;
    }

    .status {
      font-size: 0.82rem;
      color: var(--muted);
    }

    .status.ok { color: var(--ok); }
    .status.error { color: var(--error); }

    pre {
      margin: 0;
      padding: 12px;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 0.92rem;
      line-height: 1.45;
      overflow: auto;
    }

    @media (max-width: 1050px) {
      .results { grid-template-columns: 1fr; }
      .column { min-height: 300px; }
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>AI 对比问答</h1>
    <p>输入一个问题，通过后端代理并发请求 ChatGPT、Gemini、Claude，分三列展示回答。</p>

    <section class="field">
      <label for="proxy-endpoint">Proxy Endpoint（例如：https://your-worker.workers.dev/api/compare）</label>
      <input id="proxy-endpoint" type="url" placeholder="请输入代理接口地址" autocomplete="off" />
    </section>

    <textarea id="question" placeholder="请输入你的问题，例如：对比 Python 和 JavaScript 在 AI 开发中的优劣" required></textarea>

    <div class="actions">
      <button id="ask-btn" type="button">开始提问</button>
      <span class="note">三家模型会并发调用。</span>
    </div>

    <div class="warning">说明：不要在前端页面输入 API Key，Key 只放在服务端代理的环境变量中。</div>

    <section class="results">
      <article class="column">
        <div class="head">
          <div class="title">ChatGPT</div>
          <div class="status" id="status-openai">未开始</div>
        </div>
        <pre id="result-openai">等待提问...</pre>
      </article>

      <article class="column">
        <div class="head">
          <div class="title">Gemini</div>
          <div class="status" id="status-gemini">未开始</div>
        </div>
        <pre id="result-gemini">等待提问...</pre>
      </article>

      <article class="column">
        <div class="head">
          <div class="title">Claude</div>
          <div class="status" id="status-claude">未开始</div>
        </div>
        <pre id="result-claude">等待提问...</pre>
      </article>
    </section>
  </main>

  <script>
    const askBtn = document.getElementById("ask-btn");
    const questionInput = document.getElementById("question");
    const proxyInput = document.getElementById("proxy-endpoint");

    const resultOpenAi = document.getElementById("result-openai");
    const resultGemini = document.getElementById("result-gemini");
    const resultClaude = document.getElementById("result-claude");

    const statusOpenAi = document.getElementById("status-openai");
    const statusGemini = document.getElementById("status-gemini");
    const statusClaude = document.getElementById("status-claude");

    const SAVED_PROXY_KEY = "ai_compare_proxy_endpoint";

    proxyInput.value = localStorage.getItem(SAVED_PROXY_KEY) || "";

    function setStatus(el, text, cls) {
      el.textContent = text;
      el.className = "status" + (cls ? " " + cls : "");
    }

    function applyResult(targetResult, targetStatus, modelResult) {
      if (!modelResult) {
        targetResult.textContent = "错误：服务端未返回该模型结果";
        setStatus(targetStatus, "失败", "error");
        return;
      }

      if (modelResult.ok) {
        targetResult.textContent = modelResult.text || "(空响应)";
        setStatus(targetStatus, "完成", "ok");
      } else {
        targetResult.textContent = "错误：" + (modelResult.error || "未知错误");
        setStatus(targetStatus, "失败", "error");
      }
    }

    askBtn.addEventListener("click", async function () {
      const question = questionInput.value.trim();
      const endpoint = proxyInput.value.trim();

      if (!question) {
        alert("请先输入问题。");
        return;
      }

      if (!endpoint) {
        alert("请先填写 Proxy Endpoint。");
        return;
      }

      localStorage.setItem(SAVED_PROXY_KEY, endpoint);

      askBtn.disabled = true;
      setStatus(statusOpenAi, "请求中...", "");
      setStatus(statusGemini, "请求中...", "");
      setStatus(statusClaude, "请求中...", "");

      resultOpenAi.textContent = "请求中...";
      resultGemini.textContent = "请求中...";
      resultClaude.textContent = "请求中...";

      try {
        const res = await fetch(endpoint, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ question: question })
        });

        const data = await res.json().catch(function () { return {}; });

        if (!res.ok) {
          const errMsg = data.error || ("代理请求失败，HTTP " + res.status);
          throw new Error(errMsg);
        }

        const results = data.results || {};
        applyResult(resultOpenAi, statusOpenAi, results.chatgpt);
        applyResult(resultGemini, statusGemini, results.gemini);
        applyResult(resultClaude, statusClaude, results.claude);
      } catch (err) {
        const message = err && err.message ? err.message : "请求失败";
        resultOpenAi.textContent = "错误：" + message;
        resultGemini.textContent = "错误：" + message;
        resultClaude.textContent = "错误：" + message;
        setStatus(statusOpenAi, "失败", "error");
        setStatus(statusGemini, "失败", "error");
        setStatus(statusClaude, "失败", "error");
      } finally {
        askBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
