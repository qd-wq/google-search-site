<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Google Search Site</title>
  <style>
    :root {
      --bg: #f7f9fc;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #1a73e8;
      --accent-hover: #1669c1;
      --border: #dbe3ee;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, #eaf2ff 0%, var(--bg) 55%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      padding: 24px;
    }

    .card {
      width: min(720px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 10px 25px rgba(17, 24, 39, 0.08);
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.5rem, 2.6vw, 2rem);
    }

    p {
      margin: 0 0 20px;
      color: var(--muted);
    }

    form {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
    }

    input[type="search"] {
      width: 100%;
      font-size: 1rem;
      padding: 13px 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      outline: none;
    }

    input[type="search"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(26, 115, 232, 0.15);
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 0 18px;
      background: var(--accent);
      color: #fff;
      font-weight: 600;
      cursor: pointer;
    }

    button:hover { background: var(--accent-hover); }

    .tip {
      margin-top: 12px;
      color: var(--muted);
      font-size: 0.92rem;
    }

    @media (max-width: 560px) {
      form { grid-template-columns: 1fr; }
      button { min-height: 44px; }
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Google 搜索站点</h1>
    <p>输入关键词并跳转到 Google 搜索结果页。</p>

    <form action="https://www.google.com/search" method="get" target="_blank" rel="noopener noreferrer">
      <input
        type="search"
        name="q"
        placeholder="例如：GitHub Pages 教程"
        required
        autocomplete="off"
      />
      <button type="submit">Google 搜索</button>
    </form>

    <div class="tip">提示：结果会在新标签页打开。</div>
  </main>
</body>
</html>
