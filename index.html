<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Search Site</title>
  <style>
    :root {
      --bg: #f7f9fc;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #1a73e8;
      --accent-hover: #1669c1;
      --border: #dbe3ee;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, #eaf2ff 0%, var(--bg) 55%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      padding: 24px;
    }

    .card {
      width: min(1200px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 10px 25px rgba(17, 24, 39, 0.08);
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.5rem, 2.6vw, 2rem);
    }

    p {
      margin: 0 0 20px;
      color: var(--muted);
    }

    form {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      margin-bottom: 16px;
    }

    input[type="search"] {
      width: 100%;
      font-size: 1rem;
      padding: 13px 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      outline: none;
    }

    input[type="search"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(26, 115, 232, 0.15);
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 0 18px;
      background: var(--accent);
      color: #fff;
      font-weight: 600;
      cursor: pointer;
    }

    button:hover { background: var(--accent-hover); }

    .tip {
      margin-top: 4px;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .results {
      margin-top: 16px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .column {
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      background: #fff;
      min-height: 520px;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .column-head {
      padding: 10px 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
      background: #f8fbff;
      gap: 8px;
    }

    .column-title {
      font-weight: 600;
      font-size: 0.95rem;
    }

    .open-link {
      font-size: 0.85rem;
      color: var(--accent);
      text-decoration: none;
      white-space: nowrap;
    }

    .open-link:hover {
      text-decoration: underline;
    }

    iframe {
      width: 100%;
      height: 100%;
      min-height: 480px;
      border: 0;
      background: #fff;
    }

    @media (max-width: 560px) {
      form { grid-template-columns: 1fr; }
      button { min-height: 44px; }
    }

    @media (max-width: 1000px) {
      .results { grid-template-columns: 1fr; }
      .column { min-height: 420px; }
      iframe { min-height: 380px; }
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>多引擎搜索站点</h1>
    <p>输入关键词后，同时展示 Google、Bing、百度结果用于对比。</p>

    <form id="search-form">
      <input
        type="search"
        id="query"
        placeholder="例如：GitHub Pages 教程"
        required
        autocomplete="off"
      />
      <button type="submit">开始搜索</button>
    </form>

    <div class="tip">提示：若浏览器阻止站内嵌入结果，请点击每列右上角“新标签打开”。</div>

    <section class="results" id="results" hidden>
      <article class="column">
        <div class="column-head">
          <div class="column-title">Google</div>
          <a class="open-link" id="google-link" href="#" target="_blank" rel="noopener noreferrer">新标签打开</a>
        </div>
        <iframe id="google-frame" title="Google 搜索结果"></iframe>
      </article>

      <article class="column">
        <div class="column-head">
          <div class="column-title">Bing</div>
          <a class="open-link" id="bing-link" href="#" target="_blank" rel="noopener noreferrer">新标签打开</a>
        </div>
        <iframe id="bing-frame" title="Bing 搜索结果"></iframe>
      </article>

      <article class="column">
        <div class="column-head">
          <div class="column-title">百度</div>
          <a class="open-link" id="baidu-link" href="#" target="_blank" rel="noopener noreferrer">新标签打开</a>
        </div>
        <iframe id="baidu-frame" title="百度搜索结果"></iframe>
      </article>
    </section>
  </main>

  <script>
    const form = document.getElementById("search-form");
    const queryInput = document.getElementById("query");
    const results = document.getElementById("results");
    const googleFrame = document.getElementById("google-frame");
    const bingFrame = document.getElementById("bing-frame");
    const baiduFrame = document.getElementById("baidu-frame");
    const googleLink = document.getElementById("google-link");
    const bingLink = document.getElementById("bing-link");
    const baiduLink = document.getElementById("baidu-link");

    function buildUrl(base, param, query) {
      const url = new URL(base);
      url.searchParams.set(param, query);
      return url.toString();
    }

    form.addEventListener("submit", function (event) {
      event.preventDefault();
      const query = queryInput.value.trim();
      if (!query) return;

      const googleUrl = buildUrl("https://www.google.com/search", "q", query);
      const bingUrl = buildUrl("https://www.bing.com/search", "q", query);
      const baiduUrl = buildUrl("https://www.baidu.com/s", "wd", query);

      googleFrame.src = googleUrl;
      bingFrame.src = bingUrl;
      baiduFrame.src = baiduUrl;

      googleLink.href = googleUrl;
      bingLink.href = bingUrl;
      baiduLink.href = baiduUrl;

      results.hidden = false;
    });
  </script>
</body>
</html>
