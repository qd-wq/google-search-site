<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Search Site</title>
  <style>
    :root {
      --bg: #f7f9fc;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #1a73e8;
      --accent-hover: #1669c1;
      --border: #dbe3ee;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, #eaf2ff 0%, var(--bg) 55%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      padding: 24px;
    }

    .card {
      width: min(720px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 10px 25px rgba(17, 24, 39, 0.08);
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.5rem, 2.6vw, 2rem);
    }

    p {
      margin: 0 0 20px;
      color: var(--muted);
    }

    form {
      display: grid;
      grid-template-columns: 180px 1fr auto;
      gap: 10px;
    }

    select,
    input[type="search"] {
      width: 100%;
      font-size: 1rem;
      padding: 13px 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      outline: none;
    }

    select:focus,
    input[type="search"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(26, 115, 232, 0.15);
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 0 18px;
      background: var(--accent);
      color: #fff;
      font-weight: 600;
      cursor: pointer;
    }

    button:hover { background: var(--accent-hover); }

    .tip {
      margin-top: 12px;
      color: var(--muted);
      font-size: 0.92rem;
    }

    @media (max-width: 560px) {
      form { grid-template-columns: 1fr; }
      button { min-height: 44px; }
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>多引擎搜索站点</h1>
    <p>选择搜索引擎并输入关键词，在新标签页打开结果。</p>

    <form id="search-form">
      <select id="engine" aria-label="选择搜索引擎">
        <option value="google">Google</option>
        <option value="bing">Bing</option>
        <option value="baidu">百度</option>
      </select>
      <input
        type="search"
        id="query"
        placeholder="例如：GitHub Pages 教程"
        required
        autocomplete="off"
      />
      <button type="submit">开始搜索</button>
    </form>

    <div class="tip">提示：Google 和 Bing 使用参数 q，百度使用参数 wd。</div>
  </main>

  <script>
    const form = document.getElementById("search-form");
    const engineSelect = document.getElementById("engine");
    const queryInput = document.getElementById("query");

    const engines = {
      google: { url: "https://www.google.com/search", param: "q" },
      bing: { url: "https://www.bing.com/search", param: "q" },
      baidu: { url: "https://www.baidu.com/s", param: "wd" }
    };

    form.addEventListener("submit", function (event) {
      event.preventDefault();
      const query = queryInput.value.trim();
      if (!query) return;

      const engine = engines[engineSelect.value] || engines.google;
      const url = new URL(engine.url);
      url.searchParams.set(engine.param, query);
      window.open(url.toString(), "_blank", "noopener");
    });
  </script>
</body>
</html>
